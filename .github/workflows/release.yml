name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # в”Җв”Җ Frontend в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # в”Җв”Җ Go backend в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Install libpcap
        run: sudo apt-get install -y libpcap-dev

      - name: Build Linux amd64
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ../dist
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/sip-dashboard \
            ./cmd/server
        working-directory: backend

      # в”Җв”Җ Package & Release в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Compress binary
        run: |
          tar -czf dist/sip-dashboard-linux-amd64.tar.gz \
            -C dist sip-dashboard \
            build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SIP Dashboard ${{ github.ref_name }}
          body: |
            ## SIP Dashboard ${{ github.ref_name }}

            ### е®үиЈ…ж–№ејҸпјҲFreePBX жңҚеҠЎеҷЁпјү

            ```bash
            # 1. дёӢиҪҪ
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/sip-dashboard-linux-amd64.tar.gz

            # 2. и§ЈеҺӢ
            tar -xzf sip-dashboard-linux-amd64.tar.gz

            # 3. иөӢдәҲзҪ‘з»ңжҠ“еҢ…жқғйҷҗпјҲж— йңҖ sudo иҝҗиЎҢпјү
            sudo setcap cap_net_raw,cap_net_admin+eip ./sip-dashboard

            # 4. иҝҗиЎҢпјҲeth0 жӣҝжҚўдёәе®һйҷ…зҪ‘еҚЎеҗҚпјҢз”Ё ip link жҹҘзңӢпјү
            ./sip-dashboard --interface eth0 --listen :8080
            ```

            ### иҝҗиЎҢеҸӮж•°

            | еҸӮж•° | й»ҳи®ӨеҖј | иҜҙжҳҺ |
            |------|--------|------|
            | `--interface` | `eth0` | жҠ“еҢ…зҪ‘еҚЎпјҲз”Ё `ip link` жҹҘзңӢпјү|
            | `--listen` | `:8080` | HTTP зӣ‘еҗ¬ең°еқҖ |
            | `--db` | `sip-dashboard.db` | SQLite ж•°жҚ®еә“и·Ҝеҫ„ |
            | `--recordings` | `recordings/` | WAV еҪ•йҹідҝқеӯҳзӣ®еҪ• |
            | `--rtp-min` | `10000` | RTP з«ҜеҸЈиҢғеӣҙдёӢйҷҗ |
            | `--rtp-max` | `20000` | RTP з«ҜеҸЈиҢғеӣҙдёҠйҷҗ |
          files: dist/sip-dashboard-linux-amd64.tar.gz
          generate_release_notes: false
          draft: false
          prerelease: false
